backend:
  name: github
  repo: fatehaliyev/dayday
  branch: 2026-04-20-qn6c
  base_url: https://www.haliyikamamerkezi.online
  auth_endpoint: api/auth

local_backend: true

squash_merges: true
commit_messages:
  create: "content: create {{collection}} \"{{slug}}\""
  update: "content: update {{collection}} \"{{slug}}\""
  delete: "content: delete {{collection}} \"{{slug}}\""
  uploadMedia: "media: upload \"{{path}}\""
  deleteMedia: "media: delete \"{{path}}\""

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Bloq Yazıları"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Başlıq", name: "title", widget: "string" }
      - { label: "Tarix", name: "date", widget: "datetime" }
      - { label: "Şəkil", name: "thumbnail", widget: "image" }
      - { label: "Mətn", name: "body", widget: "markdown" }
